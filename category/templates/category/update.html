{% extends 'base.html' %}
{% load static %}


{% block main %}

<div class="breadcrumb">
    <a href="categories.html">Catégories</a> <span>/</span> <span id="form-breadcrumb">Nouvelle catégorie</span>
</div>
<div class="app-topbar">
    <div>
        <span class="eyebrow" id="form-eyebrow">Créer</span>
        <h1 id="form-title">Modifier la catégorie</h1>
    </div>
</div>

<form class="card card-pad" id="category-form" method="POST" action="{% url 'update-category'  cat.id %}" novalidate>
    {%  csrf_token %}

    <div class="form-grid">
        <div class="field field-full">
            <label for="{{ form.label.id_for_label }}">Nom de la catégorie</label>
            {{ form.name }}
            {% if form.label.errors %}
                <span class="field-error">Le nom est obligatoire (2 caractères minimum).</span>
            {% endif %}
        </div>
        <div class="field field-full">
            <label for=""{{ form.description.id_for_label }}">Description (optionnel)</label>
            {{form.description }}
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enregistrer </button>
          <a href="{% url 'list-category' %}" class="btn btn-secondary">Annuler</a>
        </div>
    </div>
</form>

  
{% endblock main %}
