{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokko Finance - Catégories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link " aria-current="page" href="{% url 'list-category' %}">Catégories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link " aria-current="page" href="{% url 'list-transactions' %}">transaction</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <a class="btn btn-primary mb-3" href="{% url 'create-category' %}">Ajouter</a>
        <div class="row">
            
            {% for category in categories %}
                <div class="card col-md-3 m-2">
                    {% if category.logo %}
                        <img src="{{ category.logo }}" class="card-img-top" alt="...">
                    {% else %}
                        <img src="{% static 'images/logo.webp' %}" class="card-img-top" alt="..."> 
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ category.name }}</h5>
                        <p class="card-text">{{ category.description }}</p>
                        <a href="{% url 'show-category' category.id %}" class="btn btn-primary">voir+</a>
                    </div>
                </div>
            {% endfor %}
                
        </div>
    </div>

    
    
    




        
</body>
</html>
