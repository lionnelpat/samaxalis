<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokko Finance - Catégories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
     <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link " aria-current="page" href="{% url 'list-category' %}">Catégories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link " aria-current="page" href="{% url 'list-transactions' %}">transaction</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="mb-3">
            <a href="{% url 'list-category' %}" class="btn btn-secondary">go back </a>
        </div>

        <div class="row">
            <div class="col-md-3">

            </div>
            <div class="card col-md-6 m-2 p-2">
                <form method="POST" action="{% url 'create-category' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="name" name="name">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">description</label>
                        <textarea class="form-control" name="description" id="description" rows="3"></textarea>
                    </div>
                
                    <button type="submit" class="btn btn-primary">Enregister</button>
                </form>
            </div>  
            <div class="col-md-3"></div>
        </div>
    </div>

    
    
    




        
</body>
</html>
