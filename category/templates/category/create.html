{% extends 'base.html' %}
{% load static %}


{% block main %}

<div class="breadcrumb">
    <a href="categories.html">Catégories</a> <span>/</span> <span id="form-breadcrumb">Nouvelle catégorie</span>
</div>
<div class="app-topbar">
    <div>
        <span class="eyebrow" id="form-eyebrow">Créer</span>
        <h1 id="form-title">Nouvelle catégorie</h1>
    </div>
</div>

<form class="card card-pad" id="category-form" method="POST" action="{% url 'create-category' %}" novalidate>
    {%  csrf_token %}

    <div class="form-grid">
        <div class="field field-full">
            <label for="name">Nom de la catégorie</label>
            <input type="text" id="name" name="name" placeholder="Ex : Transport, Loyer, Freelance...">
            <span class="field-error">Le nom est obligatoire (2 caractères minimum).</span>
        </div>
        <div class="field field-full">
            <label for="description">Description (optionnel)</label>
            <textarea id="description" name="description" placeholder="A quoi sert cette catégorie ?"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enregistrer </button>
          <a href="{% url 'list-category' %}" class="btn btn-secondary">Annuler</a>
        </div>
    </div>
</form>

  
{% endblock main %}
